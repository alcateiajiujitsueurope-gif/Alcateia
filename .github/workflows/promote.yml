name: Promote to Production

on:
  push:
    branches:
      - claude/audit-fix-navigation-8IIPn

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel preview build
        run: sleep 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Promote latest preview to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PREVIEW=$(vercel ls alcateia-ovel --token "$VERCEL_TOKEN" --scope alcateiajiujitsueurope-6795s-projects 2>/dev/null | grep 'Preview.*Ready' | head -1 | awk '{print $3}')
          if [ -n "$PREVIEW" ]; then
            echo "Promoting: $PREVIEW"
            vercel promote "$PREVIEW" --token "$VERCEL_TOKEN" --scope alcateiajiujitsueurope-6795s-projects --yes
            echo "Production updated."
          else
            echo "No ready preview found."
            exit 1
          fi
